name: Build & Publish Wheels

on:
  push:
    tags:
      - "v*"          # triggers on v3.29.0, v3.29.1, etc.
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  build_wheels:
    name: Wheel / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-latest, windows-latest]
        # macos-13  = x86_64 (Intel)
        # macos-latest = arm64 (Apple Silicon)

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          # Install Rust inside the build environment before building
          CIBW_BEFORE_ALL_LINUX: >
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
            source $HOME/.cargo/env
          CIBW_BEFORE_ALL_MACOS: >
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          CIBW_BEFORE_ALL_WINDOWS: >
            rustup update stable

          CIBW_ENVIRONMENT_LINUX: 'PATH="$HOME/.cargo/bin:$PATH"'
          CIBW_ENVIRONMENT_MACOS: 'PATH="$HOME/.cargo/bin:$PATH"'

          # Build for Python 3.10, 3.11, 3.12, 3.13
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          # Skip 32-bit and PyPy builds
          CIBW_SKIP: "*-win32 *-manylinux_i686 pp*"
          # Also build for Linux arm64
          CIBW_ARCHS_LINUX: "x86_64 aarch64"
          CIBW_ARCHS_MACOS: "auto"
          CIBW_ARCHS_WINDOWS: "AMD64"

          CIBW_TEST_COMMAND: >
            python -c "
            import ase.neighborlist as nl;
            assert nl._HAVE_RUST_NEIGHBORLIST, 'Rust NL not active';
            print('Rust NL active in wheel test')
            "

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build sdist
        run: |
          pip install build setuptools-rust
          python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # for trusted publishing (no API token needed)
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
