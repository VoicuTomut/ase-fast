name: Build & Publish Wheels

on:
  push:
    tags:
      - "v*"          # triggers on v3.29.0, v3.29.1, etc.
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  build_wheels:
    name: Wheel / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # macos-latest = arm64 (Apple Silicon)
        # Intel x86_64 macOS dropped (macos-13 runner is EOL)

    steps:
      - uses: actions/checkout@v4

      # Install Rust on the host runner BEFORE cibuildwheel.
      # macOS and Windows: cibuildwheel does NOT use containers, so it
      # inherits the host PATH — dtolnay/rust-toolchain is sufficient.
      # Linux: cibuildwheel uses manylinux containers; Rust must be
      # installed inside them via CIBW_BEFORE_ALL_LINUX below.
      - name: Install Rust toolchain (host)
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          # Linux containers don't inherit the host PATH — install Rust inside them.
          CIBW_BEFORE_ALL_LINUX: >
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path
          CIBW_ENVIRONMENT_LINUX: 'PATH="$HOME/.cargo/bin:$PATH"'

          # macOS / Windows: Rust is on PATH from dtolnay step above (no containers).
          # CIBW_ENVIRONMENT entries below are a belt-and-suspenders fallback.
          CIBW_ENVIRONMENT_MACOS: 'PATH="$HOME/.cargo/bin:$PATH"'
          # On Windows, $USERPROFILE expands to C:\Users\<runner-user>
          CIBW_ENVIRONMENT_WINDOWS: 'PATH="$USERPROFILE\\.cargo\\bin;$PATH"'

          # Build for Python 3.10, 3.11, 3.12, 3.13
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          # Skip 32-bit and PyPy builds
          CIBW_SKIP: "*-win32 *-manylinux_i686 pp*"
          # Also build for Linux arm64
          CIBW_ARCHS_LINUX: "x86_64 aarch64"
          CIBW_ARCHS_MACOS: "auto"
          CIBW_ARCHS_WINDOWS: "AMD64"

          CIBW_TEST_COMMAND: "python -c \"import ase.neighborlist as nl; assert nl._HAVE_RUST_NEIGHBORLIST, 'Rust NL not active'; print('Rust NL active in wheel test')\""

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build sdist
        run: |
          pip install build setuptools-rust
          python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # for trusted publishing (no API token needed)
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
